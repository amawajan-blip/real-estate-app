name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # 🔹 1. Build React
  build-react:
    name: Build React UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install React dependencies
        working-directory: react-app
        run: npm install

      - name: Build React
        working-directory: react-app
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: react-app/build/

  # 🔹 2. Build EXE
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: build-react

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Download React build
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: react-app/build/

      - name: Build EXE
        run: npx electron-builder --win

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
